<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Card-4</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<script src="logic.js?v=card4-2"></script>
<style>
  :root{
    --indigo:#485696; --paper:#e7e7e7; --peach:#f9c784; --orange:#fc7a1e; --fire:#f24c00;
    --green:#2a9d4a; --ink-navy:#232a4d;
    --bg1:#5a6bb5; --bg2:#2c3768; --ink:#fdf0d5; --hero:#f9c784; --chip-bg:#fdf0d5; --chip-ink:#2c3768;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{margin:0;background:radial-gradient(ellipse 120% 90% at 50% 32%,var(--bg1) 0%,var(--bg2) 100%);
    color:var(--ink);font-family:"Lexend Deca",-apple-system,BlinkMacSystemFont,sans-serif;
    display:flex;flex-direction:column;overflow:hidden;user-select:none;-webkit-user-select:none;
    touch-action:pan-y;overscroll-behavior:none;transition:color .45s ease;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);}
  #bg{position:fixed;inset:0;z-index:-1;background:radial-gradient(ellipse 120% 90% at 50% 32%,var(--bg1) 0%,var(--bg2) 100%);transition:opacity .45s ease;}
  #bg.flip{opacity:0;}

  /* top bar */
  #top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;padding:12px 50px 0 16px;}
  .stat{text-align:center;}
  .stat .label{font-size:10px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--ink);opacity:.65;}
  .stat .value{font-size:26px;font-weight:900;color:var(--ink);line-height:1;text-shadow:2px 2px 0 rgba(0,0,0,.25);}
  .stat .value .frac{font-size:.5em;opacity:.6;}
  #lives-wrap{text-align:center;margin-bottom:4px;}
  #hearts{font-size:36px;letter-spacing:5px;line-height:1;text-shadow:2px 2px 0 rgba(0,0,0,.25);}
  #streak{display:flex;gap:6px;justify-content:center;margin-top:5px;}
  #streak .pip{width:9px;height:9px;border-radius:50%;background:var(--ink);opacity:.25;}
  #streak .pip.on{opacity:1;background:var(--peach);}

  /* hero: lives (big, centred) + worth, all on one centre axis */
  #hero{text-align:center;padding:6px 16px 0;position:relative;display:flex;flex-direction:column;align-items:center;}
  #hero .label{font-size:11px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--hero);margin-bottom:-2px;}
  #worth{font-size:clamp(38px,12vw,66px);font-weight:900;color:var(--hero);line-height:.9;text-shadow:3px 3px 0 rgba(0,0,0,.3);}
  #worth.bump{animation:bump .4s cubic-bezier(.2,1.8,.4,1);}
  @keyframes bump{0%{transform:scale(1.35)}100%{transform:scale(1)}}
  #drop-float{position:absolute;top:2px;left:50%;transform:translateX(-50%);font-size:24px;font-weight:900;color:var(--fire);opacity:0;pointer-events:none;}
  #drop-float.go{animation:floatUp .8s ease forwards;}
  @keyframes floatUp{0%{opacity:0;transform:translate(-50%,8px)}25%{opacity:1;transform:translate(-50%,-4px)}100%{opacity:0;transform:translate(-50%,-40px)}}

  /* joker tray */
  #jokers{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;padding:8px 10px 2px;}
  .joker{font-size:10px;font-weight:800;letter-spacing:.02em;padding:6px 9px;border-radius:10px;border:2px solid var(--ink);
    background:transparent;color:var(--ink);cursor:pointer;opacity:.85;font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:1px;min-width:54px;}
  .joker .ji{font-size:15px;}
  .joker:disabled{cursor:default;}
  .joker.locked{opacity:.3;border-style:dashed;}
  .joker.used{opacity:.3;text-decoration:line-through;}
  .joker.ready{background:var(--peach);color:var(--ink-navy);border-color:var(--peach);box-shadow:0 3px 0 rgba(0,0,0,.25);opacity:1;}

  /* help */
  #btn-help{position:fixed;top:calc(env(safe-area-inset-top) + 10px);right:calc(env(safe-area-inset-right) + 10px);
    width:32px;height:32px;border:none;border-radius:50%;background:var(--chip-bg);color:var(--chip-ink);font-weight:900;font-size:17px;cursor:pointer;z-index:6;box-shadow:0 3px 0 rgba(0,0,0,.35);}

  /* stage */
  #stage{flex:1;min-height:0;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:12px;padding:6px 14px 0;max-width:680px;margin:0 auto;width:100%;}
  #stage.revealed{justify-content:space-evenly;}
  #stage:not(.revealed) #card-wrap,#stage:not(.revealed) #dots,#stage:not(.revealed) #grid{display:none;}
  #qhead{width:100%;will-change:transform;}
  #question{text-align:center;font-size:clamp(19px,5vw,30px);font-weight:800;line-height:1.22;color:var(--ink);text-shadow:2px 2px 0 rgba(0,0,0,.22);}
  #catline{text-align:center;font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--ink);opacity:.55;margin-top:4px;}

  #card-wrap{width:100%;max-width:460px;}
  #answer-card{background:var(--paper);color:var(--ink-navy);border-radius:18px;padding:34px 16px;min-height:120px;
    display:flex;align-items:center;justify-content:center;position:relative;box-shadow:0 8px 0 rgba(0,0,0,.3),0 14px 26px rgba(0,0,0,.3);}
  #answer-card .anum{position:absolute;top:9px;left:0;right:0;text-align:center;font-size:11px;font-weight:800;letter-spacing:.1em;color:var(--fire);opacity:.8;}
  #answer-card .atext{font-size:clamp(20px,6vw,32px);font-weight:800;text-align:center;word-break:break-word;}
  #answer-card.correct{background:var(--green);color:#fff;}
  #answer-card.wrong{background:var(--fire);color:#fff;}
  @keyframes cardInRight{from{transform:translateX(70px) rotate(5deg);opacity:0}}
  @keyframes cardInLeft{from{transform:translateX(-70px) rotate(-5deg);opacity:0}}
  @keyframes cardPop{from{transform:scale(.9);opacity:0}}
  @keyframes cardFlip{0%{transform:rotateY(90deg) scale(1.06)}100%{transform:rotateY(0) scale(1)}}

  /* grid mode (hindsight / lucky 2) */
  #grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;width:100%;max-width:460px;}
  .gcard{background:var(--paper);color:var(--ink-navy);border-radius:14px;padding:18px 10px;font-size:15px;font-weight:700;text-align:center;
    word-break:break-word;box-shadow:0 5px 0 rgba(0,0,0,.3);cursor:pointer;min-height:64px;display:flex;align-items:center;justify-content:center;border:3px solid transparent;}
  .gcard.marked{border-color:var(--peach);}
  .gcard.correct{background:var(--green);color:#fff;}
  .gcard.wrong{background:var(--fire);color:#fff;}

  #dots{display:flex;gap:8px;justify-content:center;}
  #dots .dot{width:9px;height:9px;border-radius:50%;background:var(--ink);opacity:.3;transition:.2s;}
  #dots .dot.on{opacity:1;transform:scale(1.5);}
  #dots .dot.correct{background:var(--green);opacity:1;transform:scale(1.5);}
  #dots .dot.wrongpick{background:var(--fire);opacity:1;transform:scale(1.5);}

  #banner{text-align:center;min-height:22px;font-size:15px;font-weight:600;color:var(--ink);text-shadow:1px 1px 0 rgba(0,0,0,.25);}
  #banner.verdict{display:inline-block;text-shadow:none;border-radius:14px;padding:8px 18px;line-height:1.25;box-shadow:0 5px 0 rgba(0,0,0,.3);animation:bump .45s;}
  #banner .big{display:block;font-size:20px;font-weight:900;}
  #banner .sub{display:block;font-size:12.5px;font-weight:700;opacity:.92;margin-top:2px;}
  #banner.v-correct{background:var(--green);color:#fff;}
  #banner.v-wrong{background:var(--fire);color:#fff;}
  #banner.v-neutral{background:var(--indigo);color:#fff;}

  /* controls */
  #controls{max-width:600px;margin:0 auto;width:100%;padding:8px 14px 8px;}
  #navrow{display:flex;gap:10px;margin-bottom:8px;}
  #controls.is-result #navrow,#controls.grid-mode #navrow{display:none;}
  button{border:none;border-radius:13px;padding:14px 10px;font-size:16px;font-weight:800;font-family:inherit;cursor:pointer;transition:transform .07s,box-shadow .07s,opacity .15s;}
  #btn-back,#btn-next{flex:1;background:transparent;color:var(--ink);border:2.5px solid var(--ink);opacity:.9;}
  #btn-back small{display:block;font-size:10px;color:var(--fire);}
  #btn-lock{width:100%;background:var(--ink-navy);color:#fdf0d5;box-shadow:0 5px 0 rgba(0,0,0,.45);}
  #controls.is-result #btn-lock{background:var(--peach);color:var(--ink-navy);box-shadow:0 5px 0 #c9923f;}
  #controls.grid-mode #btn-lock{display:none;}
  button:active{transform:translateY(3px);box-shadow:0 1px 0 rgba(0,0,0,.4)!important;}
  button:disabled{opacity:.3;cursor:default;}
  #hint{text-align:center;font-size:11px;font-weight:300;color:var(--ink);opacity:.5;padding-bottom:8px;}

  /* overlays */
  .overlay{position:fixed;inset:0;background:radial-gradient(ellipse at center,rgba(35,42,77,.96) 0%,rgba(15,18,38,.98) 100%);
    display:none;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:22px;z-index:10;overflow-y:auto;}
  .overlay.show{display:flex;}
  #over h1{color:var(--fire);margin:0 0 4px;font-size:34px;font-weight:900;transform:rotate(-2deg);text-shadow:3px 3px 0 rgba(0,0,0,.5);}
  #over .fin{font-size:40px;font-weight:900;color:var(--peach);margin:6px 0;}
  #over .sub{color:var(--paper);opacity:.8;font-size:14px;margin-bottom:14px;}
  #name-input{font-family:inherit;font-size:18px;font-weight:700;text-align:center;border:none;border-radius:12px;padding:12px 14px;width:min(260px,80vw);margin-bottom:10px;}
  #board{width:min(340px,86vw);margin:6px 0 16px;text-align:left;max-height:38vh;overflow-y:auto;}
  #board .row{display:flex;justify-content:space-between;gap:10px;padding:6px 10px;border-radius:8px;font-size:14px;color:#fdf0d5;}
  #board .row:nth-child(odd){background:rgba(255,255,255,.06);}
  #board .row.me{background:var(--peach);color:var(--ink-navy);font-weight:800;}
  #board .rank{opacity:.6;width:26px;}
  #board .nm{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  #board .sc{font-weight:800;}
  .overlay button.cta{padding:14px 40px;background:var(--orange);color:var(--ink-navy);box-shadow:0 5px 0 #c25c12;}
  #lb-status{font-size:12px;color:var(--peach);opacity:.8;min-height:16px;margin-bottom:8px;}

  #tut{max-width:480px;min-height:230px;display:flex;flex-direction:column;justify-content:center;}
  #tut .tbig{font-size:clamp(40px,12vw,72px);font-weight:900;line-height:1.05;color:#fdf0d5;text-shadow:3px 3px 0 rgba(0,0,0,.4);}
  #tut .tsmall{font-size:clamp(17px,4.8vw,23px);font-weight:600;color:var(--peach);margin-top:18px;line-height:1.4;}
  #tut-dots{display:flex;gap:7px;justify-content:center;margin:24px 0 10px;}
  #tut-dots .tdot{width:9px;height:9px;border-radius:50%;background:#fdf0d5;opacity:.3;transition:.2s;}
  #tut-dots .tdot.on{opacity:1;background:var(--peach);transform:scale(1.3);}
  #tut-hint{font-size:13px;color:#fdf0d5;opacity:.5;}
  @keyframes tfade{from{opacity:0;transform:translateX(28px)}to{opacity:1;transform:none}}

  /* category picker */
  #cats{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:460px;margin-bottom:14px;}
  #cats button{background:var(--chip-bg);color:var(--chip-ink);border-radius:10px;padding:9px 12px;font-size:12px;font-weight:700;}

  #loading{position:fixed;inset:0;display:flex;justify-content:center;align-items:center;text-align:center;font-weight:600;color:#fdf0d5;
    background:radial-gradient(ellipse 120% 90% at 50% 32%,#5a6bb5,#2c3768);z-index:20;padding:24px;}
</style>
</head>
<body>
<div id="bg"></div>
<div id="loading">Shuffling the deck…</div>
<button id="btn-help" aria-label="How to play">?</button>

<header id="top">
  <div class="stat"><div class="label">Score</div><div class="value" id="score-val">0</div></div>
  <div class="stat"><div class="label">Question</div><div class="value" id="qnum">1</div></div>
</header>

<div id="hero">
  <div id="drop-float"></div>
  <div id="lives-wrap"><div id="hearts">❤️❤️</div><div id="streak"></div></div>
  <div class="label">Worth</div><div id="worth">0</div>
</div>

<div id="jokers"></div>

<main id="stage">
  <div id="qhead"><div id="question"></div><div id="catline"></div></div>
  <div id="card-wrap"><div id="answer-card"><span class="anum"></span><span class="atext"></span></div></div>
  <div id="grid"></div>
  <div id="dots"></div>
  <div id="banner"></div>
</main>

<div id="controls">
  <div id="navrow">
    <button id="btn-back">‹ Back <small>−¼</small></button>
    <button id="btn-next">Next ›</button>
  </div>
  <button id="btn-lock">🔒 Lock in</button>
</div>
<div id="hint">swipe ← / → browse · swipe ↓ / Enter lock</div>

<!-- game over + leaderboard -->
<div id="over" class="overlay">
  <h1>GAME OVER</h1>
  <div class="sub" id="over-recap"></div>
  <div class="fin"><span id="final-score">0</span></div>
  <input id="name-input" maxlength="24" placeholder="Your name" autocomplete="off">
  <button class="cta" id="btn-submit" style="padding:12px 34px;margin-bottom:8px">Submit score</button>
  <div id="lb-status"></div>
  <div id="board"></div>
  <button class="cta" id="btn-restart">Play again</button>
</div>

<!-- category picker (Talk-Show Host) -->
<div id="cat-overlay" class="overlay">
  <h1 style="color:var(--peach);font-size:24px">Pick the next category</h1>
  <div id="cats"></div>
</div>

<div id="howto" class="overlay">
  <div id="tut"></div>
  <div id="tut-dots"></div>
  <div id="tut-hint">swipe → &nbsp;·&nbsp; or tap</div>
  <button class="cta" id="btn-howto-close" style="display:none">Play ▶</button>
</div>

<script>
const SUPABASE_URL = "https://mzxbleiqxlowtyvwjtlj.supabase.co";
const SUPABASE_KEY = "sb_publishable_lR3VquNS_mjf4QZPJyObxQ_keulYtGy";

const { CARDS, LIVES_START, LIVES_MAX, STREAK_FOR_LIFE, JOKERS, baseValue, backPenalty,
        shuffle, scoreQuestion, buildBoard, resolveAnswer, targetDifficulty, unlockedJokers, VEGAS_WIN, VEGAS_LOSE } = GameLogic;

const THEME = {
  e:{bg1:"#5a6bb5",bg2:"#2c3768",ink:"#fdf0d5",hero:"#f9c784",chipBg:"#fdf0d5",chipInk:"#2c3768"},
  m:{bg1:"#ffe0b0",bg2:"#f9c784",ink:"#2c3768",hero:"#e2520a",chipBg:"#2c3768",chipInk:"#fdf0d5"},
  h:{bg1:"#ff9a4d",bg2:"#fc7a1e",ink:"#fff6ea",hero:"#3a2a12",chipBg:"#2c3768",chipInk:"#fff6ea"},
};
const themeFor = d => d <= 2 ? "e" : d <= 5 ? "m" : "h";

const $ = id => document.getElementById(id);
const els = {
  bg:$("bg"), score:$("score-val"), qnum:$("qnum"), hearts:$("hearts"), streak:$("streak"),
  worth:$("worth"), drop:$("drop-float"), jokers:$("jokers"), stage:$("stage"), qhead:$("qhead"),
  question:$("question"), catline:$("catline"), card:$("answer-card"),
  anum:document.querySelector("#answer-card .anum"), atext:document.querySelector("#answer-card .atext"),
  grid:$("grid"), dots:$("dots"), banner:$("banner"), controls:$("controls"),
  back:$("btn-back"), next:$("btn-next"), lock:$("btn-lock"),
  over:$("over"), overRecap:$("over-recap"), finalScore:$("final-score"), name:$("name-input"),
  lbStatus:$("lb-status"), board:$("board"), restart:$("btn-restart"), submit:$("btn-submit"),
  tut:$("tut"), tutDots:$("tut-dots"), tutHint:$("tut-hint"),
  catOverlay:$("cat-overlay"), cats:$("cats"),
  howto:$("howto"), howtoClose:$("btn-howto-close"), help:$("btn-help"), loading:$("loading"),
};

let QUESTIONS = [], byDiff = {}, CATEGORIES = [], recent = new Set();
let used, qNum, score, lives, streak, bestStreak, correctTotal, scoreSubmitted;
let answers, correctIndex, cur, qPoints, base, diff, backSwipes, revealed, phase, q;
let mode, marked, vegasArmed, jokersUsed;

/* ---------- data ---------- */
async function loadQuestions(){
  const res = await fetch("questions.xlsx",{cache:"no-cache"});
  if(!res.ok) throw new Error(`questions.xlsx not found (${res.status})`);
  const wb = XLSX.read(await res.arrayBuffer());
  const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:""});
  const split = v => String(v||"").split(";").map(s=>s.trim()).filter(Boolean);
  QUESTIONS = [];
  for(const r of rows){
    const qt=String(r.Question||"").trim(), correct=String(r.Answer||"").trim();
    const wrongs=split(r.WrongAnswers), d=Number(r.Difficulty);
    if(!qt||!correct||wrongs.length<3||!(d>=1&&d<=7)) continue;
    QUESTIONS.push({q:qt, correct, wrongs:wrongs.slice(0,3), category:String(r.Category||"").trim(), difficulty:d});
  }
  if(!QUESTIONS.length) throw new Error("no usable questions");
  byDiff={}; for(let d=1;d<=7;d++) byDiff[d]=QUESTIONS.filter(x=>x.difficulty===d);
  CATEGORIES=[...new Set(QUESTIONS.map(x=>x.category))].filter(Boolean).sort();
}

/* remember questions across games so replays don't repeat the same openers */
function rememberRecent(x){
  recent.add(x.q);
  if(recent.size>400){ const a=[...recent]; recent=new Set(a.slice(a.length-400)); }
  try{ localStorage.setItem("card4-recent", JSON.stringify([...recent])); }catch(e){}
}
/* pick a question near a target difficulty: freshest first (not used this game, not seen recently) */
function pickQuestion(target, category){
  const inCat = x => !category || x.category===category;
  let pool = QUESTIONS.filter(x=>!used.has(x) && !recent.has(x.q) && inCat(x));
  if(!pool.length) pool = QUESTIONS.filter(x=>!used.has(x) && inCat(x));      // relax "recent"
  if(!pool.length) pool = QUESTIONS.filter(x=>!used.has(x));                  // relax category
  if(!pool.length){ used=new Set(); pool=QUESTIONS.filter(x=>!recent.has(x.q)); } // deck done this game
  if(!pool.length) pool = QUESTIONS.slice();
  let best=Infinity; for(const x of pool) best=Math.min(best,Math.abs(x.difficulty-target));
  const near=pool.filter(x=>Math.abs(x.difficulty-target)===best);
  const chosen=near[Math.floor(Math.random()*near.length)];
  used.add(chosen); rememberRecent(chosen);
  return chosen;
}

/* ---------- flow ---------- */
function startGame(){
  used=new Set(); qNum=0; score=0; lives=LIVES_START; streak=0; bestStreak=0; correctTotal=0;
  jokersUsed=new Set();
  els.over.classList.remove("show");
  nextQuestion();
}

function nextQuestion(){
  qNum++;
  q = pickQuestion(targetDifficulty(qNum));
  loadRound(q);
}

/* set up the board for question q (also used by Uno-Dos-Tres swap) */
function loadRound(question){
  q=question; diff=q.difficulty; base=baseValue(diff);
  const b=buildBoard(q); answers=b.answers; correctIndex=b.correctIndex;
  cur=0; backSwipes=0; qPoints=base; revealed=false; phase="playing";
  mode="normal"; marked=[]; vegasArmed=false;
  applyTheme(themeFor(diff));
  els.controls.classList.remove("is-result","grid-mode");
  els.stage.classList.remove("revealed");
  els.card.classList.remove("correct","wrong");
  els.grid.innerHTML="";
  els.card.parentElement.style.display=""; els.dots.style.display=""; // restore card view (grid jokers hide it)
  els.question.textContent=q.q;
  els.catline.textContent=q.category;
  setBanner("Swipe → to reveal the first answer","");
  els.lock.textContent="🔒 Lock in";
  renderDots(); renderJokers(); updateStats(false,true); updateNav();
}

function applyTheme(t){
  const th=THEME[t], r=document.documentElement.style;
  for(const k of ["bg1","bg2","ink","hero"]) r.setProperty("--"+k, th[k]);
  r.setProperty("--chip-bg",th.chipBg); r.setProperty("--chip-ink",th.chipInk);
  els.bg.classList.add("flip"); setTimeout(()=>els.bg.classList.remove("flip"),30);
}

function updateStats(bumpScore,bumpWorth){
  els.score.textContent=score;
  els.qnum.textContent=qNum;
  els.hearts.textContent= lives>0 ? "❤️".repeat(lives) : "💔";
  els.streak.innerHTML=""; for(let i=0;i<STREAK_FOR_LIFE;i++){const p=document.createElement("div");p.className="pip"+(i<streak?" on":"");els.streak.appendChild(p);}
  const w = vegasArmed ? `${base*VEGAS_WIN} / −${base*VEGAS_LOSE}` : qPoints;
  els.worth.textContent=w;
  if(bumpScore){els.score.classList.remove("bump");void els.score.offsetWidth;els.score.classList.add("bump");}
  if(bumpWorth){els.worth.classList.remove("bump");void els.worth.offsetWidth;els.worth.classList.add("bump");}
}

function setBanner(t,c){ els.banner.innerHTML=t; els.banner.className=c||""; }

function renderCard(anim){
  els.atext.textContent=answers[cur];
  els.anum.textContent=`Answer ${cur+1} of ${CARDS}`;
  const n=anim==="back"?"cardInLeft":anim==="next"?"cardInRight":anim==="flip"?"cardFlip":"cardPop";
  els.card.style.animation="none";void els.card.offsetWidth;els.card.style.animation=`${n} .3s ease`;
}
function renderDots(result){
  els.dots.innerHTML="";
  for(let i=0;i<CARDS;i++){const d=document.createElement("div");d.className="dot";
    if(result){ if(i===correctIndex)d.classList.add("correct"); else if(i===cur)d.classList.add("wrongpick"); }
    else if(i===cur)d.classList.add("on");
    els.dots.appendChild(d);}
}
function updateNav(){
  const playing=phase==="playing"&&mode==="normal";
  els.back.disabled=!playing||!revealed||cur===0;
  els.next.disabled=!playing||(revealed&&cur===CARDS-1);
  els.lock.disabled=phase==="playing"&&mode==="normal"&&!revealed;
}

function revealFirst(){
  if(revealed||phase!=="playing") return;
  const before=els.qhead.getBoundingClientRect().top;
  revealed=true; els.stage.classList.add("revealed");
  renderCard("pop"); renderDots(); setBanner("",""); updateNav();
  const dy=before-els.qhead.getBoundingClientRect().top;
  if(dy){els.qhead.style.transition="none";els.qhead.style.transform=`translateY(${dy}px)`;void els.qhead.offsetWidth;
    els.qhead.style.transition="transform .45s cubic-bezier(.2,1.3,.4,1)";els.qhead.style.transform="";}
}
function floatDrop(){
  els.drop.textContent=`−${backPenalty(diff)}`;
  els.drop.classList.remove("go");void els.drop.offsetWidth;els.drop.classList.add("go");
}
function navigate(dir){
  if(phase!=="playing"||mode!=="normal") return;
  if(!revealed){revealFirst();return;}
  const t=dir==="next"?cur+1:cur-1;
  if(t<0||t>=CARDS) return;
  cur=t;
  if(dir==="back"){backSwipes++;qPoints=Math.max(0,qPoints-backPenalty(diff));}
  renderCard(dir);renderDots();updateStats(false,false);
  if(dir==="back")floatDrop();
  updateNav();
}

/* unified answer resolution. idx = chosen card; opts.free = no swipe penalty (Hindsight/Lucky2) */
function answerWith(idx, opts={}){
  const correct = Array.isArray(idx) ? idx.includes(correctIndex) : idx===correctIndex;
  const chosen = Array.isArray(idx) ? (correct?correctIndex:idx[0]) : idx;
  let pts = correct ? (opts.free ? base : scoreQuestion({base,backwardSwipes:backSwipes,correct:true})) : 0;
  let recap;
  if(vegasArmed){
    if(correct){ pts = pts*VEGAS_WIN; recap=`🎰 VEGAS WIN ×${VEGAS_WIN}`; }
    else { pts = -base*VEGAS_LOSE; recap=`🎰 VEGAS BUST −${base*VEGAS_LOSE}`; }
  }
  score += pts;
  if(correct){ correctTotal++; }
  const res = resolveAnswer({lives,streak,correct});
  lives=res.lives; streak=res.streak; bestStreak=Math.max(bestStreak,res.streak===0&&correct?STREAK_FOR_LIFE:streak);
  finishQuestion(correct, pts, chosen, res, recap, opts);
}

function finishQuestion(correct, pts, chosen, res, vegasRecap, opts){
  phase="result"; cur=chosen;
  els.controls.classList.remove("grid-mode");
  // show result on the active view
  if(opts.grid){ markGridResult(chosen); }
  else { els.card.classList.add(correct?"correct":"wrong"); renderCard("flip"); renderDots(true); }
  updateStats(pts>0, true);
  let cls = correct ? "verdict v-correct" : "verdict v-wrong";
  let big = correct ? `✓ CORRECT  +${pts}` : `✕ WRONG  ${pts<0?pts:"+0"}`;
  let sub;
  if(correct){ sub = res.lifeGained ? "🔥 3 in a row — life restored!" : (vegasRecap||(opts.free?"full value (joker)":(backSwipes?`−${backSwipes*backPenalty(diff)} from back-swipes`:"clean — full value"))); }
  else { sub = `It was “${escapeHtml(answers[correctIndex])}” · ${res.gameOver?"no lives left":(vegasRecap?vegasRecap+" · ":"")+"−1 life"}`; }
  setBanner(`<span class="big">${big}</span><span class="sub">${sub}</span>`, cls);
  els.controls.classList.add("is-result");
  els.lock.textContent = res.gameOver ? "See leaderboard →" : "Next question →";
  els._gameOver = res.gameOver;
  updateNav();
}

function escapeHtml(s){return String(s).replace(/[&<>"']/g,c=>({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));}

function commit(){
  if(phase==="result"){ els._gameOver ? gameOver() : nextQuestion(); return; }
  if(phase!=="playing"||mode!=="normal"||!revealed) return;
  answerWith(cur, {});
}

/* ---------- jokers ---------- */
function renderJokers(){
  els.jokers.innerHTML="";
  const icons={obol:"⏭️",easy:"🟢",lucky2:"✌️",host:"🎤",vegas:"🎰"};
  for(const j of JOKERS){
    const b=document.createElement("button"); b.className="joker";
    const unlocked = qNum>=j.at, usedUp=jokersUsed.has(j.id);
    b.innerHTML=`<span class="ji">${icons[j.id]}</span>${j.name}`;
    if(usedUp){ b.classList.add("used"); b.disabled=true; }
    else if(!unlocked){ b.classList.add("locked"); b.disabled=true; b.innerHTML=`<span class="ji">${icons[j.id]}</span>Q${j.at}`; }
    else { b.classList.add("ready"); b.onclick=()=>useJoker(j.id); }
    els.jokers.appendChild(b);
  }
}
function useJoker(id){
  if(phase!=="playing"||mode!=="normal"||jokersUsed.has(id)||qNum<JOKERS.find(j=>j.id===id).at) return;
  if(id==="obol"){ jokersUsed.add(id); passQuestion(); }
  else if(id==="easy"){ jokersUsed.add(id); loadRound(pickQuestion(1)); setBanner("🟢 Easy does it — here's an easy one!","v-neutral"); }
  else if(id==="host"){ jokersUsed.add(id); openCategoryPicker(); }
  else if(id==="vegas"){ jokersUsed.add(id); vegasArmed=true; setBanner(`🎰 VEGAS armed — ×${VEGAS_WIN} if right, −${base*VEGAS_LOSE} if wrong`,"v-neutral"); updateStats(false,true); }
  else if(id==="lucky2"){ jokersUsed.add(id); enterGrid(); }
  renderJokers();
}
function passQuestion(){
  phase="result"; els.card.classList.remove("correct","wrong");
  setBanner(`<span class="big">⏭️ PASSED</span><span class="sub">No points, no life lost — onward</span>`,"verdict v-neutral");
  els.controls.classList.add("is-result"); els.controls.classList.remove("grid-mode");
  els.lock.textContent="Next question →"; els._gameOver=false; updateNav();
}
function enterGrid(){
  mode="lucky2"; revealed=true; els.stage.classList.add("revealed");
  els.controls.classList.add("grid-mode");
  els.card.parentElement.style.display="none"; els.dots.style.display="none";
  marked=[]; els.grid.innerHTML="";
  answers.forEach((a,i)=>{ const c=document.createElement("div"); c.className="gcard"; c.textContent=a; c.onclick=()=>onGridPick(i,c); els.grid.appendChild(c); });
  setBanner("✌️ Mark TWO cards — win if either is right","v-neutral");
}
function onGridPick(i,c){
  if(phase!=="playing"||mode!=="lucky2") return;
  c = c || els.grid.children[i];
  const at=marked.indexOf(i);
  if(at>=0){ marked.splice(at,1); c.classList.remove("marked"); }
  else if(marked.length<2){ marked.push(i); c.classList.add("marked"); }
  if(marked.length===2) resolveGrid(marked.slice());
}
function markGridResult(chosen){
  [...els.grid.children].forEach((c,i)=>{
    if(i===correctIndex) c.classList.add("correct");
    else if((Array.isArray(chosen)?chosen.includes(i):i===chosen)) c.classList.add("wrong");
  });
}
function resolveGrid(idx){ answerWith(idx, {free:true, grid:true}); } // grid stays showing the coloured result

/* ---------- talk-show host: category picker ---------- */
function openCategoryPicker(){
  els.cats.innerHTML="";
  CATEGORIES.forEach(cat=>{
    const b=document.createElement("button"); b.textContent=cat.replace(/^Entertainment: |^Science: /,"");
    b.onclick=()=>{ els.catOverlay.classList.remove("show"); loadRound(pickQuestion(targetDifficulty(qNum), cat));
      setBanner(`🎤 Swapped to ${b.textContent}`,"v-neutral"); };
    els.cats.appendChild(b);
  });
  els.catOverlay.classList.add("show");
}

/* ---------- game over + leaderboard ---------- */
async function gameOver(){
  phase="gameover"; scoreSubmitted=false;
  els.overRecap.textContent=`Reached question ${qNum} · ${correctTotal} correct · best streak ${bestStreak}`;
  els.finalScore.textContent=score;
  els.name.value = localStorage.getItem("card4-name") || "";
  els.lbStatus.textContent=""; els.submit.disabled=false; els.submit.textContent="Submit score";
  els.over.classList.add("show");
  renderBoard(await fetchTop(), null);
}
async function submitAndRefresh(){
  if(scoreSubmitted) return;                 // one entry per game
  scoreSubmitted=true; els.submit.disabled=true; els.submit.textContent="Submitted ✓";
  const name=(els.name.value||"Anonymous").trim().slice(0,24)||"Anonymous";
  localStorage.setItem("card4-name",name);
  els.lbStatus.textContent="Saving…";
  const ok=await submitScore(name,score);
  els.lbStatus.textContent= ok==="global" ? "Saved to the global leaderboard ✓" : "Saved on this device (offline)";
  renderBoard(await fetchTop(), {name,score});
}
function renderBoard(list, me){
  els.board.innerHTML="";
  if(!list.length){ els.board.innerHTML='<div class="row"><span class="nm">No scores yet — be the first!</span></div>'; return; }
  list.slice(0,20).forEach((e,i)=>{
    const row=document.createElement("div"); row.className="row"+(me&&e.name===me.name&&e.score===me.score?" me":"");
    row.innerHTML=`<span class="rank">${i+1}</span><span class="nm">${escapeHtml(e.name)}</span><span class="sc">${e.score}</span>`;
    els.board.appendChild(row);
  });
}

/* leaderboard backend: Supabase REST if configured, else localStorage */
const sbReady = SUPABASE_URL.startsWith("http") && SUPABASE_KEY.length>10;
const sbHeaders = { apikey:SUPABASE_KEY, Authorization:`Bearer ${SUPABASE_KEY}`, "Content-Type":"application/json" };
async function submitScore(name,score){
  if(sbReady){
    try{
      const r=await fetch(`${SUPABASE_URL}/rest/v1/leaderboard`,{method:"POST",headers:{...sbHeaders,Prefer:"return=minimal"},body:JSON.stringify({name,score})});
      if(r.ok) return "global";
    }catch(e){}
  }
  const local=JSON.parse(localStorage.getItem("card4-board")||"[]");
  local.push({name,score}); local.sort((a,b)=>b.score-a.score);
  localStorage.setItem("card4-board",JSON.stringify(local.slice(0,50)));
  return "local";
}
async function fetchTop(){
  if(sbReady){
    try{
      const r=await fetch(`${SUPABASE_URL}/rest/v1/leaderboard?select=name,score&order=score.desc&limit=20`,{headers:sbHeaders});
      if(r.ok) return await r.json();
    }catch(e){}
  }
  return JSON.parse(localStorage.getItem("card4-board")||"[]").sort((a,b)=>b.score-a.score);
}

/* ---------- input ---------- */
const TUT=[
  {big:"CARD-4", small:"An endless trivia run.\nHow far can you climb?"},
  {big:"4 answers,\none at a time", small:"Swipe → to flip to the next card."},
  {big:"Lock it in", small:"Swipe ↓ (or tap Lock) on the answer you believe is right."},
  {big:"Going back\ncosts you", small:"Each backward swipe drops this question's points by a quarter."},
  {big:"2 lives", small:"A wrong answer costs one. 3 right in a row earns one back."},
  {big:"It ramps up", small:"Questions get harder as you go — and worth more."},
  {big:"Jokers 🃏", small:"Lifelines unlock as you climb: pass, swap, mark two, gamble."},
  {big:"Ready?", small:"Beat your best and sign the global leaderboard."},
];
let tutIdx=0;
function renderTut(){
  const p=TUT[tutIdx];
  els.tut.innerHTML=`<div class="tbig">${p.big.replace(/\n/g,"<br>")}</div><div class="tsmall">${p.small.replace(/\n/g,"<br>")}</div>`;
  els.tut.style.animation="none";void els.tut.offsetWidth;els.tut.style.animation="tfade .35s ease";
  els.tutDots.innerHTML=""; TUT.forEach((_,i)=>{const d=document.createElement("div");d.className="tdot"+(i===tutIdx?" on":"");els.tutDots.appendChild(d);});
  const last=tutIdx===TUT.length-1;
  els.howtoClose.style.display=last?"":"none";
  els.tutHint.style.display=last?"none":"";
}
function tutNext(){ if(tutIdx<TUT.length-1){tutIdx++;renderTut();} else hideHowto(); }
function tutPrev(){ if(tutIdx>0){tutIdx--;renderTut();} }
function showHowto(){ tutIdx=0; renderTut(); els.howto.classList.add("show"); }
function hideHowto(){ els.howto.classList.remove("show"); localStorage.setItem("card4-howto","1"); }
document.addEventListener("keydown",e=>{
  if(els.howto.classList.contains("show")){
    if(e.key==="ArrowRight"||e.key==="Enter"){e.preventDefault();tutNext();}
    else if(e.key==="ArrowLeft"){e.preventDefault();tutPrev();}
    else if(e.key==="Escape"){e.preventDefault();hideHowto();}
    return;
  }
  if(els.over.classList.contains("show")){ if(e.key==="Enter"){e.preventDefault(); scoreSubmitted?startGame():submitAndRefresh();} return; }
  if(els.catOverlay.classList.contains("show")) return;
  if(e.key==="ArrowRight"){e.preventDefault();navigate("next");}
  else if(e.key==="ArrowLeft"){e.preventDefault();navigate("back");}
  else if(e.key==="Enter"){e.preventDefault(); if(phase==="gameover")startGame(); else commit();}
});
els.back.onclick=()=>navigate("back");
els.next.onclick=()=>navigate("next");
els.lock.onclick=commit;
els.restart.onclick=startGame;
els.help.onclick=showHowto;
els.howtoClose.onclick=hideHowto;
els.submit.onclick=submitAndRefresh;
els.howto.addEventListener("click",e=>{ if(e.target!==els.howtoClose) tutNext(); });

let tx=null,ty=null;
document.addEventListener("touchstart",e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
document.addEventListener("touchend",e=>{
  if(tx===null) return;
  const dx=e.changedTouches[0].clientX-tx, dy=e.changedTouches[0].clientY-ty; tx=ty=null;
  if(els.howto.classList.contains("show")){ if(Math.abs(dx)>40&&Math.abs(dx)>Math.abs(dy)) (dx<0?tutNext():tutPrev()); return; } // taps handled by click
  if(els.over.classList.contains("show")||els.catOverlay.classList.contains("show")) return;
  if(dy>60&&Math.abs(dy)>Math.abs(dx)*1.5){ if(phase==="gameover")startGame(); else if(mode==="normal")commit(); return; }
  if(Math.abs(dx)>45&&Math.abs(dx)>Math.abs(dy)*1.2) navigate(dx<0?"next":"back");
},{passive:true});

/* ---------- boot ---------- */
loadQuestions().then(()=>{
  els.loading.style.display="none";
  try{ recent=new Set(JSON.parse(localStorage.getItem("card4-recent")||"[]")); }catch(e){}
  startGame();
  if(!localStorage.getItem("card4-howto")) showHowto();
}).catch(err=>{ els.loading.textContent=`Couldn't load questions: ${err.message}`; });
</script>
